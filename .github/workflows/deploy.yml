name: Deploy Stock Chart Viewer to Pages

on:
  schedule:
    # Runs Monday to Friday at 18:00 JST (09:00 UTC)
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages and creating Releases
permissions:
  contents: write # Required to create/update GitHub Releases
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache DuckDB database file and WebP chart images to enable fast incremental updates on GitHub Actions
      - name: Cache DuckDB and Generated Charts
        uses: actions/cache@v4
        with:
          path: |
            stock.duckdb
            data/charts
          key: stock-data-cache-${{ github.run_id }}
          restore-keys: |
            stock-data-cache-

      # Run all pipelines (fetch data, build DuckDB, generate WebP charts, and export static assets)
      - name: Build static site assets
        run: npm run all:static
        env:
          PORT: 3000

      # Upload the updated stock.duckdb database to GitHub Releases so users can download it for local use
      - name: Upload database to GitHub Releases
        run: |
          # Create the release if it does not exist (silently ignore if it already exists)
          gh release create latest \
            --title "Latest Stock Database" \
            --notes "Automated daily stock database update from GitHub Actions." \
            --prerelease || true
          # Upload or overwrite the database file in the existing release
          gh release upload latest stock.duckdb --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
