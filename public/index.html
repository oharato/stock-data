<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>株価チャート・マルチビューア</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="true" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <!-- Custom layouts style from consolidated viewer.css -->
  </head>
  <body>
    <!-- Root Alpine Component definition -->
    <div x-data="tickerApp({ initialSearch: '', initialSector: '', initialSort: 'code_asc' })" class="app-root-wrapper">

      <!-- Drawer Overlay -->
      <div class="drawer-overlay" x-show="isDrawerOpen" @click="isDrawerOpen = false" x-transition style="display: none;"></div>

      <!-- Sticky Top Control Bar -->
      <div class="top-control-bar">
        <!-- Hamburger Trigger Button inside control bar -->
        <button class="menu-trigger" :class="{ 'active': isDrawerOpen }" @click="isDrawerOpen = !isDrawerOpen" title="フィルターを開く">
          <span></span>
          <span></span>
          <span></span>
        </button>
        
        <!-- Active Filters Compact Inline Display -->
        <div class="active-filters-bar-compact">
          <span class="filter-badge" x-text="searchQuery ? '🔍 ' + searchQuery : '🔍 すべて'"></span>
          <span class="filter-badge" x-text="selectedSector ? '📁 ' + selectedSector : '📁 全業種'"></span>
          <span class="filter-badge accent-badge" x-text="getSortLabel()"></span>
          <span class="filter-badge count-badge" x-text="'対象: ' + filteredTickers.length + '件'"></span>
        </div>
      </div>

      <!-- Slide-out Drawer -->
      <aside class="filter-drawer" :class="{ 'open': isDrawerOpen }">
        <div class="drawer-header">
          <div>
            <h2>📊 フィルター & ソート</h2>
            <div class="drawer-match-count" style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">対象: <span x-text="filteredTickers.length" style="color: var(--accent); font-weight: bold;"></span> / <span x-text="allTickers.length"></span> 銘柄</div>
          </div>
          <span class="close-drawer-btn" @click="isDrawerOpen = false">&times;</span>
        </div>
        <form @submit.prevent="isDrawerOpen = false;" class="filter-form">
          <div class="form-grid-vertical">
            <!-- Search -->
            <div class="form-group search-group">
              <label>コード・銘柄名検索</label>
              <div class="search-input-wrapper">
                <input
                  type="text"
                  x-model="searchQuery"
                  @input="applyFiltersAndSort()"
                  placeholder="例: トヨタ、7203"
                />
              </div>
            </div>

            <!-- Sector -->
            <div class="form-group">
              <label>33業種絞り込み</label>
              <select x-model="selectedSector" @change="applyFiltersAndSort()">
                <option value="">全業種を表示</option>
                <template x-for="s in sectors" :key="s">
                  <option :value="s" x-text="s"></option>
                </template>
              </select>
            </div>

            <!-- Sort -->
            <div class="form-group">
              <label>並べ替え順</label>
              <select x-model="sortKey" @change="applyFiltersAndSort()">
                <option value="code_asc">コード順 (昇順)</option>
                <option value="code_desc">コード順 (降順)</option>
                <option value="name_asc">銘柄名順 (昇順)</option>
                <option value="name_desc">銘柄名順 (降順)</option>
                <option value="price_asc">株価安順</option>
                <option value="price_desc">株価高順</option>
                <option value="change_asc">騰落率低順</option>
                <option value="change_desc">騰落率高順</option>
                <option value="volume_asc">売買高少順</option>
                <option value="volume_desc">売買高多順</option>
                <option value="market_cap_asc">時価総額安順</option>
                <option value="market_cap_desc">時価総額高順</option>
                <option value="per_asc">PER安順 (割安)</option>
                <option value="per_desc">PER高順</option>
                <option value="pbr_asc">PBR安順</option>
                <option value="pbr_desc">PBR高順</option>
                <option value="yield_asc">配当利回り低順</option>
                <option value="yield_desc">配当利回り高順</option>
                <option value="ma50_asc">50日線乖離低順</option>
                <option value="ma50_desc">50日線乖離高順</option>
                <option value="ma200_asc">200日線乖離低順</option>
                <option value="ma200_desc">200日線乖離高順</option>
                <option value="low52_asc">52週安値乖離低順</option>
                <option value="low52_desc">52週安値乖離高順</option>
                <option value="high52_asc">52週高値乖離低順</option>
                <option value="high52_desc">52週高値乖離高順</option>
                <option value="ipo_asc">上場日古順</option>
                <option value="ipo_desc">上場日新順</option>
              </select>
            </div>

            <!-- Price Range -->
            <div class="form-group range-group">
              <label>株価範囲</label>
              <div class="slider-container">
                <div class="range-sliders">
                  <input type="range" min="0" max="20000" step="100" x-model.number="filterPriceMin" @input="sliderMinChanged('filterPriceMin', 'filterPriceMax')" class="slider-min" />
                  <input type="range" min="0" max="20000" step="100" x-model.number="filterPriceMax" @input="sliderMaxChanged('filterPriceMin', 'filterPriceMax')" class="slider-max" />
                </div>
                <div class="range-labels">
                  <span x-text="filterPriceMin.toLocaleString() + ' 円'"></span>
                  <span class="range-separator">〜</span>
                  <span x-text="filterPriceMax.toLocaleString() + ' 円'"></span>
                </div>
              </div>
            </div>

            <!-- Change Range -->
            <div class="form-group range-group">
              <label>騰落率範囲</label>
              <div class="slider-container">
                <div class="range-sliders">
                  <input type="range" min="-30" max="30" step="0.5" x-model.number="filterChangeMin" @input="sliderMinChanged('filterChangeMin', 'filterChangeMax')" class="slider-min" />
                  <input type="range" min="-30" max="30" step="0.5" x-model.number="filterChangeMax" @input="sliderMaxChanged('filterChangeMin', 'filterChangeMax')" class="slider-max" />
                </div>
                <div class="range-labels">
                  <span x-text="(filterChangeMin > 0 ? '+' : '') + filterChangeMin + '%'"></span>
                  <span class="range-separator">〜</span>
                  <span x-text="(filterChangeMax > 0 ? '+' : '') + filterChangeMax + '%'"></span>
                </div>
              </div>
            </div>

            <!-- Volume Range -->
            <div class="form-group range-group">
              <label>売買高範囲</label>
              <div class="slider-container">
                <div class="range-sliders">
                  <input type="range" min="0" max="10000000" step="10000" x-model.number="filterVolumeMin" @input="sliderMinChanged('filterVolumeMin', 'filterVolumeMax')" class="slider-min" />
                  <input type="range" min="0" max="10000000" step="10000" x-model.number="filterVolumeMax" @input="sliderMaxChanged('filterVolumeMin', 'filterVolumeMax')" class="slider-max" />
                </div>
                <div class="range-labels">
                  <span x-text="formatVolume(filterVolumeMin)"></span>
                  <span class="range-separator">〜</span>
                  <span x-text="formatVolume(filterVolumeMax)"></span>
                </div>
              </div>
            </div>

            <!-- Market Cap Range -->
            <div class="form-group range-group">
              <label>時価総額範囲</label>
              <div class="slider-container">
                <div class="range-sliders">
                  <input type="range" min="0" max="10000" step="10" x-model.number="filterMarketCapMin" @input="sliderMinChanged('filterMarketCapMin', 'filterMarketCapMax')" class="slider-min" />
                  <input type="range" min="0" max="10000" step="10" x-model.number="filterMarketCapMax" @input="sliderMaxChanged('filterMarketCapMin', 'filterMarketCapMax')" class="slider-max" />
                </div>
                <div class="range-labels">
                  <span x-text="filterMarketCapMin + ' 億円'"></span>
                  <span class="range-separator">〜</span>
                  <span x-text="filterMarketCapMax + ' 億円'"></span>
                </div>
              </div>
            </div>

            <!-- PER Range -->
            <div class="form-group range-group">
              <label>実績PER範囲</label>
              <div class="slider-container">
                <div class="range-sliders">
                  <input type="range" min="0" max="100" step="0.5" x-model.number="filterPerMin" @input="sliderMinChanged('filterPerMin', 'filterPerMax')" class="slider-min" />
                  <input type="range" min="0" max="100" step="0.5" x-model.number="filterPerMax" @input="sliderMaxChanged('filterPerMin', 'filterPerMax')" class="slider-max" />
                </div>
                <div class="range-labels">
                  <span x-text="filterPerMin + ' 倍'"></span>
                  <span class="range-separator">〜</span>
                  <span x-text="filterPerMax + ' 倍'"></span>
                </div>
              </div>
            </div>

            <!-- PBR Range -->
            <div class="form-group range-group">
              <label>PBR範囲</label>
              <div class="slider-container">
                <div class="range-sliders">
                  <input type="range" min="0" max="10" step="0.1" x-model.number="filterPbrMin" @input="sliderMinChanged('filterPbrMin', 'filterPbrMax')" class="slider-min" />
                  <input type="range" min="0" max="10" step="0.1" x-model.number="filterPbrMax" @input="sliderMaxChanged('filterPbrMin', 'filterPbrMax')" class="slider-max" />
                </div>
                <div class="range-labels">
                  <span x-text="filterPbrMin + ' 倍'"></span>
                  <span class="range-separator">〜</span>
                  <span x-text="filterPbrMax + ' 倍'"></span>
                </div>
              </div>
            </div>

            <!-- Dividend Yield Range -->
            <div class="form-group range-group">
              <label>配当利回り範囲</label>
              <div class="slider-container">
                <div class="range-sliders">
                  <input type="range" min="0" max="15" step="0.1" x-model.number="filterYieldMin" @input="sliderMinChanged('filterYieldMin', 'filterYieldMax')" class="slider-min" />
                  <input type="range" min="0" max="15" step="0.1" x-model.number="filterYieldMax" @input="sliderMaxChanged('filterYieldMin', 'filterYieldMax')" class="slider-max" />
                </div>
                <div class="range-labels">
                  <span x-text="filterYieldMin + '%'"></span>
                  <span class="range-separator">〜</span>
                  <span x-text="filterYieldMax + '%'"></span>
                </div>
              </div>
            </div>

            <!-- MA50 Diff Range -->
            <div class="form-group range-group">
              <label>50日線乖離率範囲</label>
              <div class="slider-container">
                <div class="range-sliders">
                  <input type="range" min="-50" max="50" step="0.5" x-model.number="filterMa50Min" @input="sliderMinChanged('filterMa50Min', 'filterMa50Max')" class="slider-min" />
                  <input type="range" min="-50" max="50" step="0.5" x-model.number="filterMa50Max" @input="sliderMaxChanged('filterMa50Min', 'filterMa50Max')" class="slider-max" />
                </div>
                <div class="range-labels">
                  <span x-text="(filterMa50Min > 0 ? '+' : '') + filterMa50Min + '%'"></span>
                  <span class="range-separator">〜</span>
                  <span x-text="(filterMa50Max > 0 ? '+' : '') + filterMa50Max + '%'"></span>
                </div>
              </div>
            </div>

            <!-- MA200 Diff Range -->
            <div class="form-group range-group">
              <label>200日線乖離率範囲</label>
              <div class="slider-container">
                <div class="range-sliders">
                  <input type="range" min="-50" max="50" step="0.5" x-model.number="filterMa200Min" @input="sliderMinChanged('filterMa200Min', 'filterMa200Max')" class="slider-min" />
                  <input type="range" min="-50" max="50" step="0.5" x-model.number="filterMa200Max" @input="sliderMaxChanged('filterMa200Min', 'filterMa200Max')" class="slider-max" />
                </div>
                <div class="range-labels">
                  <span x-text="(filterMa200Min > 0 ? '+' : '') + filterMa200Min + '%'"></span>
                  <span class="range-separator">〜</span>
                  <span x-text="(filterMa200Max > 0 ? '+' : '') + filterMa200Max + '%'"></span>
                </div>
              </div>
            </div>

            <!-- 52-Week Low Diff Range -->
            <div class="form-group range-group">
              <label>52週安値から乖離率</label>
              <div class="slider-container">
                <div class="range-sliders">
                  <input type="range" min="0" max="100" step="1" x-model.number="filterLow52Min" @input="sliderMinChanged('filterLow52Min', 'filterLow52Max')" class="slider-min" />
                  <input type="range" min="0" max="100" step="1" x-model.number="filterLow52Max" @input="sliderMaxChanged('filterLow52Min', 'filterLow52Max')" class="slider-max" />
                </div>
                <div class="range-labels">
                  <span x-text="'+' + filterLow52Min + '%'"></span>
                  <span class="range-separator">〜</span>
                  <span x-text="'+' + filterLow52Max + '%'"></span>
                </div>
              </div>
            </div>

            <!-- 52-Week High Diff Range -->
            <div class="form-group range-group">
              <label>52週高値から乖離率</label>
              <div class="slider-container">
                <div class="range-sliders">
                  <input type="range" min="-100" max="0" step="1" x-model.number="filterHigh52Min" @input="sliderMinChanged('filterHigh52Min', 'filterHigh52Max')" class="slider-min" />
                  <input type="range" min="-100" max="0" step="1" x-model.number="filterHigh52Max" @input="sliderMaxChanged('filterHigh52Min', 'filterHigh52Max')" class="slider-max" />
                </div>
                <div class="range-labels">
                  <span x-text="filterHigh52Min + '%'"></span>
                  <span class="range-separator">〜</span>
                  <span x-text="filterHigh52Max + '%'"></span>
                </div>
              </div>
            </div>

            <!-- IPO Date Year Range -->
            <div class="form-group range-group">
              <label>上場年範囲</label>
              <div class="slider-container">
                <div class="range-sliders">
                  <input type="range" min="1950" max="2026" step="1" x-model.number="filterIpoMin" @input="sliderMinChanged('filterIpoMin', 'filterIpoMax')" class="slider-min" />
                  <input type="range" min="1950" max="2026" step="1" x-model.number="filterIpoMax" @input="sliderMaxChanged('filterIpoMin', 'filterIpoMax')" class="slider-max" />
                </div>
                <div class="range-labels">
                  <span x-text="filterIpoMin + ' 年'"></span>
                  <span class="range-separator">〜</span>
                  <span x-text="filterIpoMax + ' 年'"></span>
                </div>
              </div>
            </div>

            <div class="filter-actions">
              <button type="button" @click="isDrawerOpen = false" class="apply-filter-btn">閉じる</button>
              <button type="button" @click="resetFilters()" class="clear-filter-btn">リセット</button>
            </div>
          </div>
        </form>
      </aside>

      <div class="app-container">


        <!-- Ticker List (Hydrated dynamically by Alpine x-for) -->
        <main class="ticker-list">
          <!-- Loading placeholder when initializing -->
          <div class="loading-indicator" x-show="isLoading" style="display: none;">
            <div class="spinner"></div>
            <span>株価データを読み込み中...</span>
          </div>

          <!-- Empty state -->
          <div class="empty-state" x-show="!isLoading && displayedTickers.length === 0" style="display: none;">
            <div class="empty-icon">📂</div>
            <h3>一致する銘柄が見つかりませんでした</h3>
            <p>検索条件やフィルターを変更してみてください。</p>
          </div>

          <template x-for="t in displayedTickers" :key="t.code">
            <div class="ticker-card" :id="'ticker-' + t.code">
              <div class="ticker-card-info">
                <div class="left-info">
                  <span class="ticker-code-badge" x-text="t.code"></span>
                  <h2 class="ticker-name-text" @click="openDetail(t)" x-text="t.name"></h2>
                  <span class="ticker-market-text" x-text="t.market"></span>
                  <div class="ticker-card-price-row">
                    <span class="ticker-card-price" x-text="t.current_price !== null ? Number(t.current_price).toLocaleString() + ' 円' : '---'"></span>
                    <span class="ticker-card-change" 
                          :class="t.change_percent >= 0 ? 'change-up' : 'change-down'"
                          x-show="t.change_percent !== null"
                          x-text="'前日比: ' + formatPriceDiff(t) + '(' + (t.change_percent > 0 ? '+' : '') + Number(t.change_percent).toFixed(2) + '%)'"></span>
                  </div>
                </div>
                <div class="right-info">
                  <span class="ticker-sector-text" x-text="t.sector33"></span>
                  <span class="ticker-market-cap" x-text="formatMarketCap(t.market_cap)"></span>
                  <div class="fundamental-summary-badges">
                    <span class="fundamental-summary-badge per-badge" x-show="t.per !== null && t.per !== undefined" x-text="'PER ' + Number(t.per).toFixed(1) + '倍'"></span>
                    <span class="fundamental-summary-badge pbr-badge" x-show="t.pbr !== null && t.pbr !== undefined" x-text="'PBR ' + Number(t.pbr).toFixed(2) + '倍'"></span>
                    <span class="fundamental-summary-badge yield-badge" x-show="t.dividend_yield !== null && t.dividend_yield > 0" x-text="'利回り ' + (Number(t.dividend_yield)*100).toFixed(2) + '%'"></span>
                  </div>
                </div>
              </div>

              <!-- Chart Grid -->
              <div class="chart-grid">
                <div class="chart-container" @click="openLightbox('./charts/monthly/' + t.code + '.webp', t.code + ' 月足')">
                  <img :src="'./charts/monthly/' + t.code + '.webp'" alt="月足" loading="lazy" />
                  <span class="chart-period-badge monthly">月足</span>
                </div>
                <div class="chart-container" @click="openLightbox('./charts/weekly/' + t.code + '.webp', t.code + ' 週足')">
                  <img :src="'./charts/weekly/' + t.code + '.webp'" alt="週足" loading="lazy" />
                  <span class="chart-period-badge weekly">週足</span>
                </div>
                <div class="chart-container" @click="openLightbox('./charts/daily/' + t.code + '.webp', t.code + ' 日足')">
                  <img :src="'./charts/daily/' + t.code + '.webp'" alt="日足" loading="lazy" />
                  <span class="chart-period-badge daily">日足</span>
                </div>
              </div>
            </div>
          </template>
        </main>

        <!-- Loading Indicator for Infinite Scroll -->
        <div class="loading-indicator" x-show="hasMore" style="display: none;">
          <div class="spinner"></div>
          <span>さらに読み込み中...</span>
        </div>
      </div>

      <!-- Lightbox / Modal -->
      <div class="lightbox" x-show="isLightboxOpen" @click="closeLightbox()" x-transition style="display: none;">
        <span class="lightbox-close" @click="closeLightbox()">&times;</span>
        <div class="lightbox-content" @click.stop>
          <img :src="lightboxImg" alt="拡大画像" />
          <div class="lightbox-caption" x-text="lightboxCaption"></div>
        </div>
      </div>

      <!-- Ticker Detail Info Modal -->
      <div class="detail-modal-overlay" x-show="isDetailOpen" @click="closeDetail()" x-transition style="display: none;">
        <div class="detail-modal-card" @click.stop x-show="selectedTicker">
          <template x-if="selectedTicker">
            <div>
              <span class="detail-modal-close-btn" @click="closeDetail()">&times;</span>
              <div class="detail-modal-header">
                <h2>
                  <span class="ticker-code-badge" x-text="selectedTicker.code"></span>
                  <span x-text="selectedTicker.name"></span>
                </h2>
                <div class="ticker-market-text" x-text="selectedTicker.market || '---'"></div>
                <div class="detail-modal-price-row">
                  <span class="detail-modal-price" x-text="selectedTicker.current_price !== null ? Number(selectedTicker.current_price).toLocaleString() + ' 円' : '---'"></span>
                  <span class="detail-modal-change" 
                        :class="selectedTicker.change_percent >= 0 ? 'change-up' : 'change-down'"
                        x-show="selectedTicker.change_percent !== null"
                        x-text="'前日比: ' + formatPriceDiff(selectedTicker) + '(' + (selectedTicker.change_percent > 0 ? '+' : '') + Number(selectedTicker.change_percent).toFixed(2) + '%)'"></span>
                </div>
              </div>
              <div class="detail-modal-body">
                <!-- Tab Buttons (Shown only if qualitative descriptions exist) -->
                <div class="tab-buttons" x-show="selectedTicker.business_description || selectedTicker.business_risks || selectedTicker.business_policy" style="display: none;">
                  <button type="button" @click="activeDetailTab = 'financial'" :class="{ 'active': activeDetailTab === 'financial' }">📊 財務・株価データ</button>
                  <button type="button" @click="activeDetailTab = 'description'" :class="{ 'active': activeDetailTab === 'description' }" x-show="selectedTicker.business_description">📝 事業内容</button>
                  <button type="button" @click="activeDetailTab = 'risks'" :class="{ 'active': activeDetailTab === 'risks' }" x-show="selectedTicker.business_risks">⚠️ 事業リスク</button>
                  <button type="button" @click="activeDetailTab = 'policy'" :class="{ 'active': activeDetailTab === 'policy' }" x-show="selectedTicker.business_policy">🎯 経営方針</button>
                </div>

                <!-- Tab 1: Financial & Trade Data -->
                <div x-show="activeDetailTab === 'financial' || !(selectedTicker.business_description || selectedTicker.business_risks || selectedTicker.business_policy)">
                  <div class="detail-modal-grid-3col">
                    <!-- Box 1: Trade Data -->
                    <div class="detail-modal-sub-card">
                      <div class="detail-modal-sub-card-title">株価・取引データ</div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">始値</span>
                        <span class="detail-modal-data-value" x-text="selectedTicker.open_price !== null ? Number(selectedTicker.open_price).toLocaleString() + ' 円' : '---'"></span>
                      </div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">前日終値</span>
                        <span class="detail-modal-data-value" x-text="selectedTicker.prev_close !== null ? Number(selectedTicker.prev_close).toLocaleString() + ' 円' : '---'"></span>
                      </div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">本日高値</span>
                        <span class="detail-modal-data-value" x-text="selectedTicker.high_price !== null ? Number(selectedTicker.high_price).toLocaleString() + ' 円' : '---'"></span>
                      </div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">本日安値</span>
                        <span class="detail-modal-data-value" x-text="selectedTicker.low_price !== null ? Number(selectedTicker.low_price).toLocaleString() + ' 円' : '---'"></span>
                      </div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">売買高</span>
                        <span class="detail-modal-data-value" x-text="formatVolume(selectedTicker.volume_day)"></span>
                      </div>
                    </div>

                    <!-- Box 2: Financial Metrics -->
                    <div class="detail-modal-sub-card">
                      <div class="detail-modal-sub-card-title">詳細財務指標</div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">業種</span>
                        <span class="detail-modal-data-value" x-text="selectedTicker.sector33 || '---'"></span>
                      </div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">時価総額</span>
                        <span class="detail-modal-data-value" x-text="formatMarketCap(selectedTicker.market_cap)"></span>
                      </div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">実績PER</span>
                        <span class="detail-modal-data-value" x-text="selectedTicker.per !== null && selectedTicker.per !== undefined ? Number(selectedTicker.per).toFixed(1) + ' 倍' : '---'"></span>
                      </div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">PBR</span>
                        <span class="detail-modal-data-value" x-text="selectedTicker.pbr !== null && selectedTicker.pbr !== undefined ? Number(selectedTicker.pbr).toFixed(2) + ' 倍' : '---'"></span>
                      </div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">配当利回り</span>
                        <span class="detail-modal-data-value" x-text="selectedTicker.dividend_yield !== null && selectedTicker.dividend_yield !== undefined ? (Number(selectedTicker.dividend_yield) * 100).toFixed(2) + '%' : '---'"></span>
                      </div>
                    </div>

                    <!-- Box 3: Technical & 52-Week Deviations -->
                    <div class="detail-modal-sub-card">
                      <div class="detail-modal-sub-card-title">移動平均・52週乖離</div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">50日線乖離</span>
                        <span class="detail-modal-data-value" x-text="formatPercent(selectedTicker.ma50_diff)"></span>
                      </div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">200日線乖離</span>
                        <span class="detail-modal-data-value" x-text="formatPercent(selectedTicker.ma200_diff)"></span>
                      </div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">52週安値から</span>
                        <span class="detail-modal-data-value" x-text="formatPercent(selectedTicker.low52_diff)"></span>
                      </div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">52週高値から</span>
                        <span class="detail-modal-data-value" x-text="formatPercent(selectedTicker.high52_diff)"></span>
                      </div>
                      <div class="detail-modal-data-row">
                        <span class="detail-modal-data-label">上場日</span>
                        <span class="detail-modal-data-value" x-text="formatIpoDate(selectedTicker.ipo_date)"></span>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Tab 2: Business Description -->
                <div x-show="activeDetailTab === 'description' && selectedTicker.business_description" style="display: none;">
                  <div class="detail-text-area" x-text="selectedTicker.business_description"></div>
                </div>

                <!-- Tab 3: Business Risks -->
                <div x-show="activeDetailTab === 'risks' && selectedTicker.business_risks" style="display: none;">
                  <div class="detail-text-area" x-text="selectedTicker.business_risks"></div>
                </div>

                <!-- Tab 4: Business Policy -->
                <div x-show="activeDetailTab === 'policy' && selectedTicker.business_policy" style="display: none;">
                  <div class="detail-text-area" x-text="selectedTicker.business_policy"></div>
                </div>

                <div class="detail-modal-actions">
                  <a :href="getYahooLink(selectedTicker.code)" target="_blank" rel="noopener noreferrer" class="detail-action-link-btn detail-primary-btn">
                    🌐 Yahoo!ファイナンスで詳細を見る
                  </a>
                  <a :href="getTradingViewLink(selectedTicker.code)" target="_blank" rel="noopener noreferrer" class="detail-action-link-btn detail-secondary-btn">
                    📈 TradingView で表示
                  </a>
                </div>
              </div>
            </template>
          </div>
        </div>

      </div>

      <!-- CSS Styles Specific to Viewer page -->
      <link rel="stylesheet" href="./public/viewer.css" />

      <!-- Lightbox / Drawer / Infinite Scroll JavaScript -->
      <script src="./public/viewer.js" defer></script>

      <!-- Alpine.js Local bundle -->
      <script defer src="./public/alpine.js"></script>
    </div>
  </body>
</html>
